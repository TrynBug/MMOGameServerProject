# ────────────────────────────────────────────────────────────────
# GameServer.ini
# ────────────────────────────────────────────────────────────────
# ServerID 범위:
#   Registry  : 1
#   Login     : 10
#   Chat      : 20
#   Gateway   : 100~199
#   Game      : 200~899
#   (예비)    : 900~999

[Server]
Type    = Game
Id      = 200          # 200~899 범위
IP      = 127.0.0.1
ClientPort   = -1      # (클라이언트 통신 없음)
InternalPort = 10200   # 서버 내부통신 포트

[Registry]
IP      = 127.0.0.1
Port    = 10001

[Network]
NumConcurrentThread = 2
NumWorkerThread     = 4
InitPacketSize      = 512
MaxPacketSize       = 65535
UserCountReportMs   = 10000

[Contents]
NumContentsThreads  = 0         # 0이면 CPU 코어 수 - 1로 자동 설정. 최소 1 이상 필요(오픈필드 0번 스레드).
ContentsUpdateMs    = 50

[Log]
Dir     = Logs
Level   = Debug     # Debug / Info / Warn / Error
