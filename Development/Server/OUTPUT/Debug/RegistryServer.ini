# ────────────────────────────────────────────────────────────────
# RegistryServer.ini
# ────────────────────────────────────────────────────────────────
# ServerID 범위:
#   Registry  : 1
#   Login     : 10
#   Chat      : 20
#   Gateway   : 100~199
#   Game      : 200~899
#   (예비)    : 900~999

[Server]
Type    = Registry
Id      = 1
IP      = 0.0.0.0
ClientPort   = -1      # (클라이언트 통신 없음)
InternalPort = 10001   # 서버 내부통신 포트

[Network]
NumConcurrentThread = 2         # 0 = CPU 코어 수
NumWorkerThread     = 4         # 0 = CPU 코어 수 * 2
InitPacketSize      = 512
MaxPacketSize       = 65535

[Contents]
NumContentsThreads  = 1         # 컨텐츠 스레드 수
ContentsUpdateMs    = 50        # 컨텐츠 Update 주기 (ms)

[Log]
Dir     = Logs
Level   = Debug                 # Debug / Info / Warn / Error
