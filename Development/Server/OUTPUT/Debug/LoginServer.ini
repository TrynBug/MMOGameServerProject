# ────────────────────────────────────────────────────────────────
# LoginServer.ini
# ────────────────────────────────────────────────────────────────
# ServerID 범위:
#   Registry  : 1
#   Login     : 10
#   Chat      : 20
#   Gateway   : 100~199
#   Game      : 200~899
#   (예비)    : 900~999

[Server]
Type    = Login
Id      = 10
IP      = 0.0.0.0
ClientPort   = 8001    # 클라이언트 통신 포트
InternalPort = 10010   # 서버 내부통신 포트

[Registry]
IP      = 127.0.0.1
Port    = 10001

[Network]
NumConcurrentThread = 2         # 0 = CPU 코어 수
NumWorkerThread     = 4         # 0 = CPU 코어 수 * 2
InitPacketSize      = 512
MaxPacketSize       = 65535

[Contents]
NumContentsThreads  = 1         # 컨텐츠 스레드 수
ContentsUpdateMs    = 50        # 컨텐츠 Update 주기 (ms)

[Log]
Dir     = Logs
Level   = Debug                 # Debug / Info / Warn / Error
